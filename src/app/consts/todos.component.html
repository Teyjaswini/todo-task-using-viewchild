<div class="row">
    <div class="col-md-6 mb-4 mb-md-0">
        <div class="form-group">
            <input type="text" #todoControl class="form-control">
        </div>
        <button 
        *ngIf="!isInEditMode"
        (click)="onTodoAdd()" 
        class="mr-2 btn btn-sm btn-outline-primary">
            Add Todo
        </button>

        <button 
        *ngIf="isInEditMode"
        (click)="onUpdate()" 
        class="mr-2 btn btn-sm btn-outline-primary">
            Update Todo
        </button>
    </div>
    <div class="col-md-6">
        <ul class="list-group" *ngIf="todosArr.length > 0; else noTodos">
            <li *ngFor="let todo of todosArr; trackBy : trackByFun"
                class="d-flex justify-content-between list-group-item">
                <strong>
                    {{todo.todoItem}}
                </strong>
                <div>
                    <button (click)="onEdit(todo)" class="mr-2 btn btn-sm btn-outline-primary">Edit</button>
                    <button (click)="onRemove(todo.todoId)" class="mr-2 btn btn-sm btn-outline-danger">Remove</button>
                </div>
            </li>
        </ul>

        <ng-template #noTodos>
            <p class="alert alert-info">
                No Todos Added Yet !!!
            </p>
        </ng-template>
    </div>
</div>
